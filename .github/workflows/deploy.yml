name: Deploy site

# The bullmoose.cc marketing + guides site (src/, Astro → Cloudflare Pages).
# Design/plan: docs/architecture/marketing-site.md.
#
# Prereqs (one-time, in Cloudflare):
#   1. The CLOUDFLARE_API_TOKEN repo secret must include **Cloudflare Pages:
#      Edit** (the Workers deploy token may not — add the scope or use a
#      Pages-scoped token). CLOUDFLARE_ACCOUNT_ID is already set.
#   2. First run creates the `bullmoose` Pages project (direct upload).
#      Then map the apex `bullmoose.cc` to it in the Pages dashboard.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build
        working-directory: src
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src
          command: pages deploy dist --project-name=bullmoose --branch=main
