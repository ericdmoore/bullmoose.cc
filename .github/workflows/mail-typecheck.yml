name: Mail platform typecheck
on:
  push:
    paths:
      - "packages/**"
      - "services/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  pull_request:
    paths:
      - "packages/**"
      - "services/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
